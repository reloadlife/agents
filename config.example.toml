# agentsd example config — copy to config.toml or ~/.config/agentsd/config.toml
# See also: deploy/config.server.example.toml

listen = "127.0.0.1:8787"
jobs_dir = "./.jobs"
workspace_root = "."
default_cwd = "." # workspace root
max_concurrent_jobs = 1
default_timeout = "30m"
max_timeout = "2h"

[auth]
bearer_env = "AGENTSD_TOKEN"

[sessions]
# SSH Host alias for remote TTY (agentsctl session open --ssh).
ssh_host = ""
# Virtual display for headed Playwright/Chromium (see deploy/xvfb.service)
display = ":99"
# playwright_browsers_path = "/home/you/.cache/ms-playwright"
# playwright_server = "ws://127.0.0.1:9333"  # optional docker compose service
# [sessions.env]
# CUSTOM = "value"

# --- Agents ---
# Interactive TTY (default for `agentsctl session start`): uses Args only.
# Print/API jobs (`agentsctl run`): uses PrintArgs — may burn API credits.

[agents.claude]
bin = "claude"
args = []
print_args = ["-p"]

[agents.grok]
bin = "grok"
args = []
print_args = []

[agents.codex]
bin = "codex"
args = []
print_args = ["exec"]

[agents.opencode]
bin = "opencode"
args = []
print_args = ["run"]

[agents.cursor]
bin = "cursor-agent"
args = []
print_args = ["-p"]

[agents.cursor-agent]
bin = "cursor-agent"
args = []
print_args = ["-p"]

[agents.mock]
bin = "echo"
args = ["mock-agent:"]
print_args = ["mock-agent:"]

[allow]
# Paths relative to workspace_root — keep this tight on shared hosts
paths = [
  ".",
  # "my-repo",
  # "my-repo/**",
]

[caps]
default = ["fs_read", "fs_write", "net_install"]
elevated = ["git_push", "gh_pr", "kubectl_write", "shell_raw"]

[status]
gke_context = ""
# optional HTTP probe for status panel
opendray_url = ""

# Embedded browser UI (multi-tab PTY) at http://<listen>/
# Set enabled = false to serve API only.
[web]
enabled = true

# Workspace text memory (SQLite FTS5 + optional vectors).
# Agents: agentsctl memory search
# dir defaults to {jobs_dir}/memory
[memory]
enabled = true
# dir = ""
# Optional OpenAI-compatible embeddings (vector search). Leave empty for FTS only.
# embed_url = "https://api.openai.com/v1"
# embed_model = "text-embedding-3-small"
# embed_api_key_env = "AGENTS_EMBED_KEY"

# Context manager — orientation for faster/better agent runs.
# On session start: ensure PROJECT_MAP + CONTEXT.md + memory index, seed short protocol.
# agentsctl context status|ensure|pack|note -r <cwd>
[context]
ensure_on_session = true
seed_orientation = true
# seed_budget = 1800
# pack_budget = 12000
auto_index = true
write_files = true

# Session recording archives pane snapshots under jobs_dir/recordings (privacy: default off)
# [sessions]
# recording = true
# max_concurrent = 8
# auto_note = true

# Webhooks (JSON POST Event) — ntfy, Discord, Slack-compatible, etc.
# [notify]
# webhook_url = "https://ntfy.sh/my-agents-topic"
# events = ["session.started", "session.stopped", "session.deleted"]

# Multi-token auth: map label → env var name
# [auth]
# bearer_env = "AGENTSD_TOKEN"
# extra_tokens = { ops = "AGENTS_TOKEN_OPS" }
# trusted_header = "Tailscale-User-Login"   # audit actor / optional auth
# require_bearer = true
