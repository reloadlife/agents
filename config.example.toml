# agentsd example config — copy to config.toml or ~/.config/agentsd/config.toml
# See also: deploy/config.server.example.toml
#
# --- Security knobs (read first) ---
#   listen              Prefer 127.0.0.1 + Tailscale/tunnel; avoid 0.0.0.0 on untrusted nets
#   AGENTSD_TOKEN       From auth.bearer_env; store in env file mode 600 (openssl rand -hex 32)
#   auth.extra_tokens   Optional map label → env var name for additional bearers (ops/CI)
#   auth.trusted_header e.g. Tailscale-User-Login (audit actor; auth only if require_bearer=false)
#   auth.require_bearer Default true. false only behind a proxy that strips spoofed headers
#   allow.paths         Tight allowlist under workspace_root
#   sessions.recording  Default off — pane archives under jobs_dir/recordings (see docs/RECORDING.md)
#   web.enabled         Static shell is public; all control is /v1/* + token
# Full policy: SECURITY.md · ops checklist: docs/SECURITY-OPS.md · privacy: docs/RECORDING.md

listen = "127.0.0.1:8787"
jobs_dir = "./.jobs"
workspace_root = "."
default_cwd = "." # workspace root
max_concurrent_jobs = 1
default_timeout = "30m"
max_timeout = "2h"

[auth]
# Primary token: env var name (value must be set before agentsd start).
bearer_env = "AGENTSD_TOKEN"
# Extra bearers: label → env var name (not the raw secret). Any matching token authenticates.
# Labels show up in audit actor only — not multi-tenant isolation.
#   export AGENTS_TOKEN_OPS="$(openssl rand -hex 32)"
# extra_tokens = { ops = "AGENTS_TOKEN_OPS", guest = "AGENTS_TOKEN_GUEST" }
# trusted_header = "Tailscale-User-Login"   # or Cf-Access-Authenticated-User-Email
# require_bearer = true                    # false = header-only auth behind trusted proxy

[sessions]
# SSH Host alias for remote TTY (agentsctl session open --ssh).
ssh_host = ""
# Virtual display for headed Playwright/Chromium (see deploy/xvfb.service)
display = ":99"
# playwright_browsers_path = "/home/you/.cache/ms-playwright"
# playwright_server = "ws://127.0.0.1:9333"  # optional docker compose service
# [sessions.env]
# CUSTOM = "value"
#
# Session recording — archives pane snapshots under {jobs_dir}/recordings (privacy: default off).
# Secrets are redacted line-by-line on archive. Prune runs after each archive.
# recording = true
# recording_max_per_session = 20  # keep newest N per session (0 = default 20, <0 unlimited)
# recording_max_age_days = 0      # drop older than N days on archive (0 = disabled)
# max_concurrent = 8   # cap running TTY sessions (0 = unlimited)
# auto_note = true     # write a memory note when a session is killed/stopped

# --- Agents ---
# Interactive TTY (default for `agentsctl session start`): uses Args only.
# Print/API jobs (`agentsctl run`): uses PrintArgs — may burn API credits.

[agents.claude]
bin = "claude"
args = []
print_args = ["-p"]

[agents.grok]
bin = "grok"
args = []
print_args = []
# Optional overrides (defaults are built-in):
# session_id_args = ["--session-id", "{id}"]
# resume_args = ["--resume", "{id}"]

[agents.codex]
bin = "codex"
args = []
print_args = ["exec"]
# resume_args = ["resume", "{id}"]

[agents.opencode]
bin = "opencode"
args = []
print_args = ["run"]
# resume_args = ["--session", "{id}"]

[agents.cursor]
bin = "cursor-agent"
args = []
print_args = ["-p"]

[agents.cursor-agent]
bin = "cursor-agent"
args = []
print_args = ["-p"]

[agents.mock]
bin = "echo"
args = ["mock-agent:"]
print_args = ["mock-agent:"]

[allow]
# Paths relative to workspace_root — keep this tight on shared hosts
paths = [
  ".",
  # "my-repo",
  # "my-repo/**",
]

[caps]
default = ["fs_read", "fs_write", "net_install"]
elevated = ["git_push", "gh_pr", "kubectl_write", "shell_raw"]

[status]
gke_context = ""
# optional HTTP probe for status panel
opendray_url = ""

# Embedded browser UI (multi-tab PTY) at http://<listen>/
# Set enabled = false to serve API only.
[web]
enabled = true

# Workspace text memory (SQLite FTS5 + optional vectors).
# Agents: agentsctl memory search
# dir defaults to {jobs_dir}/memory
[memory]
enabled = true
# dir = ""
# Optional OpenAI-compatible embeddings (vector search). Leave empty for FTS only.
# embed_url = "https://api.openai.com/v1"
# embed_model = "text-embedding-3-small"
# embed_api_key_env = "AGENTS_EMBED_KEY"

# Context manager — orientation for faster/better agent runs.
# On session start: ensure PROJECT_MAP + CONTEXT.md + memory index, seed short protocol.
# agentsctl context status|ensure|pack|note -r <cwd>
[context]
ensure_on_session = true
seed_orientation = true
# seed_budget = 1800
# pack_budget = 12000
auto_index = true
write_files = true

# Webhooks (JSON POST Event) — ntfy, Discord, Slack-compatible, etc.
# [notify]
# webhook_url = "https://ntfy.sh/my-agents-topic"
# events = ["session.started", "session.stopped", "session.deleted"]
