name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install tmux
        run: sudo apt-get update -qq && sudo apt-get install -y -qq tmux

      - name: Build embedded web UI
        run: make web

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Integration (tmux + mock agent)
        run: go test -tags=integration -count=1 -timeout 2m ./internal/session/

      - name: Build
        run: |
          go build -o bin/agentsd ./cmd/agentsd
          go build -o bin/agentsctl ./cmd/agentsctl
