# Optional Playwright browser server (non-headless via host Xvfb or container display).
#
# Usage:
#   # ensure Xvfb is running on the host (DISPLAY=:99)
#   docker compose -f deploy/docker-compose.playwright.yml up -d
#
# Then in agentsd config.toml:
#   [sessions]
#   display = ":99"
#   playwright_server = "ws://127.0.0.1:9333"
#
# Agents / code can connect with:
#   browser = await chromium.connect(process.env.PLAYWRIGHT_SERVER)
#
# Or use host-installed Playwright against DISPLAY=:99 without this container.

services:
  playwright:
    image: mcr.microsoft.com/playwright:v1.61.1-noble
    container_name: agents-playwright
    restart: unless-stopped
    # Share host network so agentsd on the same host can use 127.0.0.1:9333
    network_mode: host
    # Give Chromium enough shared memory
    shm_size: "2gb"
    environment:
      # Use host Xvfb (deploy/xvfb.service). Non-headless browsers need a display.
      DISPLAY: ${DISPLAY:-:99}
      PLAYWRIGHT_HEADLESS: "0"
    volumes:
      # Access host display socket when not using host network X11 abstract socket
      # For network_mode: host, DISPLAY=:99 talks to host Xvfb directly.
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    # Run Playwright's long-lived server for remote connect
    command:
      - bash
      - -lc
      - |
        npx --yes playwright@1.61.1 run-server --host 0.0.0.0 --port 9333
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/9333' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
